name: "Proxmox IaC Pipeline"

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  terraform:
    name: "Terraform Apply"
    runs-on: self-hosted
    environment: "Proxmox"
    
    # Colocar aqui no topo do job garante que todos os steps vejam as envs
    env:
      TF_VAR_proxmox_api_url: ${{ secrets.PROXMOX_API_URL }}
      TF_VAR_proxmox_api_token_id: ${{ secrets.PROXMOX_API_TOKEN_ID }}
      TF_VAR_proxmox_api_token_secret: ${{ secrets.PROXMOX_API_TOKEN_SECRET }}
      TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}

    defaults:
      run:
        working-directory: ./terraform

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Debug Secret Existence
        run: |
          echo "Verificando se os segredos existem (sem mostrar o conteúdo):"
          [ -n "${PM_API_URL}" ] && echo "URL: OK" || echo "URL: VAZIA"
          [ -n "${PM_API_TOKEN_ID}" ] && echo "TOKEN_ID: OK" || echo "TOKEN_ID: VAZIA"

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve


      - name: Testar conexão com as VMs (Ansible Ping)
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False" # Para não travar pedindo confirmação de fingerprint
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          # 1. Cria o arquivo da chave privada temporariamente
          echo "$SSH_PRIVATE_KEY" > private_key.pem
          chmod 600 private_key.pem

          # 2. Roda um comando ad-hoc do Ansible
          # -i: aponta para os IPs das VMs (Master e Workers)
          # -u: usuário padrão do Ubuntu
          # --private-key: usa a chave que acabamos de criar
          ansible all -i "172.22.0.29,172.22.0.30,172.22.0.31," \
                  -m ping \
                  -u ubuntu \
                  --private-key private_key.pem
