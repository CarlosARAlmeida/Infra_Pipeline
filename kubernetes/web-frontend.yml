apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: shop-lab
spec:
  type: NodePort
  ports:
    - name: "http"
      port: 80
      targetPort: 80
  selector:
    io.kompose.service: frontend

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: shop-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: frontend
  template:
    metadata:
      labels:                    
        io.kompose.service: frontend
    spec:
      imagePullSecrets:
        - name: regcred # <--- A "chave" para o GHCR
      containers:
        - image: ghcr.io/carlosaralmeida/shop-ui:v1
          name: shop-ui
          ports:
            - containerPort: 80
              protocol: TCP
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
      restartPolicy: Always