apiVersion: v1
kind: ConfigMap
metadata:
  name: python-test-code
  namespace: crud-lab
data:
  app.py: |
    import logging, time
    from flask import Flask
    logging.basicConfig(level=logging.INFO, format='%(asctime)s %(levelname)s %(message)s')
    logger = logging.getLogger(__name__)
    app = Flask(__name__)

    @app.route('/')
    def hello():
        logger.info("Carlos, acesso detectado! Gerando log para o Loki.")
        return "Lab Python: Ativo e Gerando Logs! 🚀"

    if __name__ == '__main__':
        app.run(host='0.0.0.0', port=5000)

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-python-carlos
  namespace: crud-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app-python-carlos
  template:
    metadata:
      labels:
        app: app-python-carlos
    spec:
      containers:
      - name: python-container
        image: python:3.9-slim
        command: ["/bin/sh", "-c"]
        args:
          - |
            pip install flask
            python /app/app.py
        resources: # <--- O VSCode agora vai ficar feliz
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        ports:
        - containerPort: 5000
        volumeMounts:
        - name: code-volume
          mountPath: /app/app.py
          subPath: app.py
      volumes:
      - name: code-volume
        configMap:
          name: python-test-code

---
apiVersion: v1
kind: Service
metadata:
  name: app-python-svc
  namespace: crud-lab
spec:
  type: NodePort
  selector:
    app: app-python-carlos
  ports:
  - port: 80
    targetPort: 5000
    nodePort: 30500