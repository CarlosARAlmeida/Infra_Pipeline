apiVersion: v1
kind: ConfigMap
metadata:
  name: python-test-code
  namespace: crud-lab
data:
  app.py: |
    import logging, time, os, psycopg2
    from flask import Flask, request # Importado 'request' para o 404 funcionar
    
    # OpenTelemetry Base e Tracing
    from opentelemetry import trace, metrics
    from opentelemetry.sdk.trace import TracerProvider
    from opentelemetry.sdk.trace.export import BatchSpanProcessor
    from opentelemetry.exporter.otlp.proto.http.trace_exporter import OTLPSpanExporter
    from opentelemetry.sdk.resources import Resource
    
    # OpenTelemetry Metrics (O segredo para o Prometheus)
    from opentelemetry.exporter.prometheus import PrometheusMetricReader
    from opentelemetry.sdk.metrics import MeterProvider
    from prometheus_client import start_http_server

    # Instrumentação Automática
    from opentelemetry.instrumentation.flask import FlaskInstrumentor
    from opentelemetry.instrumentation.psycopg2 import Psycopg2Instrumentor

    # 1. Configurando o Tracing
    resource = Resource(attributes={"service.name": "app-python-carlos"})
    provider = TracerProvider(resource=resource)
    otlp_exporter = OTLPSpanExporter(endpoint="http://jaeger-svc.crud-lab:4318/v1/traces")
    provider.add_span_processor(BatchSpanProcessor(otlp_exporter))
    trace.set_tracer_provider(provider)
    tracer = trace.get_tracer(__name__)

    # 2. Configurando Métricas (Expondo na porta 8000)
    start_http_server(port=8000, addr="0.0.0.0")
    reader = PrometheusMetricReader()
    meter_provider = MeterProvider(resource=resource, metric_readers=[reader])
    metrics.set_meter_provider(meter_provider)

    # 3. Ativando Instrumentação
    app = Flask(__name__)
    FlaskInstrumentor().instrument_app(app)
    Psycopg2Instrumentor().instrument()

    logging.basicConfig(level=logging.INFO, format='%(asctime)s %(levelname)s %(message)s')
    logger = logging.getLogger(__name__)

    DB_HOST = "postgres-svc.crud-lab"
    DB_NAME = "observability_db"
    DB_USER = "carlos"
    DB_PASS = "lab123"

    @app.route('/')
    def hello():
        with tracer.start_as_current_span("acesso-home") as span:
            trace_id = format(span.get_span_context().trace_id, "032x")
            logger.info(f"Acesso à Home! | traceID={trace_id}")
            return "Lab Python: On! Tente acessar /db para testar o banco. 🚀"

    @app.route('/db')
    def test_db():
        with tracer.start_as_current_span("operacao-banco-de-dados") as span:
            trace_id = format(span.get_span_context().trace_id, "032x")
            try:
                conn = psycopg2.connect(host=DB_HOST, database=DB_NAME, user=DB_USER, password=DB_PASS)
                cur = conn.cursor()
                cur.execute("CREATE TABLE IF NOT EXISTS acessos (id serial PRIMARY KEY, data timestamp);")
                cur.execute("INSERT INTO acessos (data) VALUES (now());")
                conn.commit()
                cur.close()
                conn.close()
                logger.info(f"Registro no Postgres OK | traceID={trace_id}")
                return f"Banco acessado! Trace: {trace_id}"
            except Exception as e:
                logger.error(f"Erro no banco | traceID={trace_id} | erro={e}")
                return "Erro no banco", 500

    from opentelemetry.trace import Status, StatusCode

    @app.errorhandler(404)
    def page_not_found(e):
        current_span = trace.get_current_span()
        current_span.set_status(Status(StatusCode.ERROR))
        current_span.set_attribute("http.status_code", 404)
        current_span.set_attribute("error", True)
        trace_id = format(current_span.get_span_context().trace_id, "032x")
        
        # Agora o request.path vai funcionar
        logger.error(f"Página não encontrada: 404 | path={request.path} | traceID={trace_id}")
        return "Ops! Essa rota não existe no lab do Carlos. 404", 404

    if __name__ == '__main__':
        app.run(host='0.0.0.0', port=5000)

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-python-carlos
  namespace: crud-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app-python-carlos
  template:
    metadata:
      labels:
        app: app-python-carlos
    spec:
      containers:
      - name: python-container
        image: python:3.9-slim
        command: ["/bin/sh", "-c"]
        args:
          - |
            pip install flask \
                        psycopg2-binary \
                        opentelemetry-api \
                        opentelemetry-sdk \
                        opentelemetry-exporter-otlp \
                        opentelemetry-instrumentation-flask \
                        opentelemetry-instrumentation-psycopg2 \
                        opentelemetry-exporter-prometheus # <--- Nova lib de métricas
            python /app/app.py
        ports:
        - containerPort: 5000
          name: http
        - containerPort: 8000 # <--- Porta de métricas exposta no container
          name: metrics
        volumeMounts:
        - name: code-volume
          mountPath: /app/app.py
          subPath: app.py
      volumes:
      - name: code-volume
        configMap:
          name: python-test-code

---
apiVersion: v1
kind: Service
metadata:
  name: app-python-svc
  namespace: crud-lab
  labels:
    app: app-python-carlos # Label para o ServiceMonitor encontrar
spec:
  type: NodePort
  selector:
    app: app-python-carlos
  ports:
  - name: http
    port: 80
    targetPort: 5000
    nodePort: 30500
  - name: metrics # <--- Porta de métricas no Service
    port: 8000
    targetPort: 8000