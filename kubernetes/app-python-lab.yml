apiVersion: v1
kind: ConfigMap
metadata:
  name: python-test-code
  namespace: crud-lab
data:
  app.py: |
    import logging, time
    from flask import Flask
    from opentelemetry import trace
    from opentelemetry.sdk.trace import TracerProvider
    from opentelemetry.sdk.trace.export import BatchSpanProcessor
    from opentelemetry.exporter.otlp.proto.http.trace_exporter import OTLPSpanExporter
    from opentelemetry.sdk.resources import Resource # Simplificado aqui

    # 1. Configurando o Tracing (Sem depender da constante que mudou de versão)
    resource = Resource(attributes={"service.name": "app-python-carlos"})
    provider = TracerProvider(resource=resource)
    
    otlp_exporter = OTLPSpanExporter(endpoint="http://jaeger-svc.crud-lab:4318/v1/traces")
    
    provider.add_span_processor(BatchSpanProcessor(otlp_exporter))
    trace.set_tracer_provider(provider)
    tracer = trace.get_tracer(__name__)

    logging.basicConfig(level=logging.INFO, format='%(asctime)s %(levelname)s %(message)s')
    logger = logging.getLogger(__name__)
    app = Flask(__name__)

    @app.route('/')
    def hello():
        with tracer.start_as_current_span("requisicao-carlos-home"):
            logger.info("Carlos, agora com OTEL 1.40 funcionando!")
            return "Lab Python: Instrumentação Corrigida! 🚀"

    if __name__ == '__main__':
        app.run(host='0.0.0.0', port=5000)

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-python-carlos
  namespace: crud-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app-python-carlos
  template:
    metadata:
      labels:
        app: app-python-carlos
    spec:
      containers:
      - name: python-container
        image: python:3.9-slim
        command: ["/bin/sh", "-c"]
        args:
          - |
            # Adicionando a biblioteca de convenções semânticas por garantia
            pip install flask \
                        opentelemetry-api \
                        opentelemetry-sdk \
                        opentelemetry-exporter-otlp \
                        opentelemetry-semantic-conventions
            python /app/app.py
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        ports:
        - containerPort: 5000
        volumeMounts:
        - name: code-volume
          mountPath: /app/app.py
          subPath: app.py
      volumes:
      - name: code-volume
        configMap:
          name: python-test-code

---
apiVersion: v1
kind: Service
metadata:
  name: app-python-svc
  namespace: crud-lab
spec:
  type: NodePort
  selector:
    app: app-python-carlos
  ports:
  - port: 80
    targetPort: 5000
    nodePort: 30500