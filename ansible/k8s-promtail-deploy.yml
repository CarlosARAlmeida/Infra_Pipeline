- name: Playbook para Deploy do Promtail no K3s
  hosts: k8s_master
  become: true
  tasks:
    - name: RBAC para o Promtail (Garantir permissões)
      kubernetes.core.k8s:
        kubeconfig: /etc/rancher/k3s/k3s.yaml
        state: present
        definition:
          - apiVersion: v1
            kind: ServiceAccount
            metadata:
              name: promtail-sa
              namespace: crud-lab
          - apiVersion: rbac.authorization.k8s.io/v1
            kind: ClusterRole
            metadata:
              name: promtail-clusterrole
            rules:
            - apiGroups: [""]
              resources: ["nodes", "nodes/proxy", "services", "endpoints", "pods"]
              verbs: ["get", "list", "watch"]
          - apiVersion: rbac.authorization.k8s.io/v1
            kind: ClusterRoleBinding
            metadata:
              name: promtail-clusterrolebinding
            subjects:
            - kind: ServiceAccount
              name: promtail-sa
              namespace: crud-lab
            roleRef:
              kind: ClusterRole
              name: promtail-clusterrole
              apiGroup: rbac.authorization.k8s.io

    - name: Criar ConfigMap do Promtail (Ajuste de Nó + Path)
      kubernetes.core.k8s:
        kubeconfig: /etc/rancher/k3s/k3s.yaml
        state: present
        definition:
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: promtail-config
            namespace: crud-lab
          data:
            promtail.yaml: |
              server:
                http_listen_port: 9080
                grpc_listen_port: 0

              clients:
                - url: http://172.22.0.87:3100/loki/api/v1/push

              scrape_configs:
                - job_name: kubernetes-pods
                  kubernetes_sd_configs:
                    - role: pod
                  relabel_configs:
                    # 1. SÓ OLHA O PRÓPRIO NÓ: Evita que o Master tente ler o Worker
                    - source_labels: [__meta_kubernetes_pod_node_name]
                      action: keep
                      regex: ${HOSTNAME}

                    # 2. Labels para o Grafana
                    - source_labels: [__meta_kubernetes_namespace]
                      target_label: namespace
                    - source_labels: [__meta_kubernetes_pod_name]
                      target_label: pod
                    - source_labels: [__meta_kubernetes_container_name]
                      target_label: container

                    # 3. CONSTRUÇÃO DO PATH (Bate com o seu 'ls -lh')
                    # Formato K3s: /var/log/pods/namespace_podname_uid/container/*.log
                    - source_labels: [__meta_kubernetes_namespace, __meta_kubernetes_pod_name, __meta_kubernetes_pod_uid, __meta_kubernetes_container_name]
                      separator: _
                      action: replace
                      target_label: __path__
                      # O regex abaixo captura: namespace(1)_pod(2)_uid(3) / container(4)
                      regex: (.+)_(.+)_(.+)_(.+)
                      replacement: /var/log/pods/${1}_${2}_${3}/${4}/*.log

    - name: Deploy do Promtail (DaemonSet como Root)
      kubernetes.core.k8s:
        kubeconfig: /etc/rancher/k3s/k3s.yaml
        state: present
        definition:
          apiVersion: apps/v1
          kind: DaemonSet
          metadata:
            name: promtail
            namespace: crud-lab
          spec:
            selector:
              matchLabels:
                name: promtail
            template:
              metadata:
                labels:
                  name: promtail
              spec:
                service_account_name: promtail-sa
                securityContext:
                  runAsUser: 0
                  runAsGroup: 0
                containers:
                - name: promtail
                  image: grafana/promtail:2.9.4
                  args:
                  - -config.file=/etc/promtail/promtail.yaml
                  securityContext:
                    privileged: true
                  volumeMounts:
                  - name: pods-logs
                    mountPath: /var/log/pods
                    readOnly: true
                  - name: config
                    mountPath: /etc/promtail
                volumes:
                - name: pods-logs
                  host_path:
                    path: /var/log/pods
                - name: config
                  config_map:
                    name: promtail-config