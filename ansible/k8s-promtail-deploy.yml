- name: Playbook para Deploy do Promtail no K3s
  hosts: k8s_master
  become: true
  tasks:
    - name: Criar ConfigMap do Promtail (Ajuste Final de Regex)
      kubernetes.core.k8s:
        kubeconfig: /etc/rancher/k3s/k3s.yaml
        state: present
        definition:
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: promtail-config
            namespace: crud-lab
          data:
            promtail.yaml: |
              server:
                http_listen_port: 9080

              clients:
                - url: http://172.22.0.87:3100/loki/api/v1/push

              scrape_configs:
                - job_name: kubernetes-pods
                  kubernetes_sd_configs:
                    - role: pod
                  relabel_configs:
                    # 1. Labels de Identificação no Grafana
                    - source_labels: [__meta_kubernetes_namespace]
                      target_label: namespace
                    - source_labels: [__meta_kubernetes_pod_name]
                      target_label: pod
                    - source_labels: [__meta_kubernetes_container_name]
                      target_label: container

                    # 2. O MAPA DEFINITIVO (Usando Globbing Simples)
                    # Usamos o UID para localizar a pasta, não importa o prefixo.
                    - source_labels: [__meta_kubernetes_pod_uid, __meta_kubernetes_container_name]
                      separator: /
                      action: replace
                      # O regex abaixo captura o UID (1) e o Container (2)
                      regex: (.+)/(.+)
                      replacement: /var/log/pods/*$1/$2/*.log
                      target_label: __path__

                    # 3. DEBUG: Cria uma label visível no targets para conferirmos o path
                    - source_labels: [__path__]
                      target_label: debug_path

                    # 4. Filtro de Segurança (Removido o 'keep' para restaurar a visão total)
                    # Uma vez que o 'ready' estiver positivo, voltamos a filtrar o namespace.

    - name: Deploy do Promtail (DaemonSet Corrigido)
      kubernetes.core.k8s:
        kubeconfig: /etc/rancher/k3s/k3s.yaml
        state: present
        definition:
          apiVersion: apps/v1
          kind: DaemonSet
          metadata:
            name: promtail
            namespace: crud-lab
          spec:
            selector:
              matchLabels:
                name: promtail
            template:
              metadata:
                labels:
                  name: promtail
              spec:
                serviceAccountName: promtail-sa
                securityContext:
                  runAsUser: 0
                  runAsGroup: 0
                containers:
                - name: promtail
                  image: grafana/promtail:2.9.4
                  args:
                  - -config.file=/etc/promtail/promtail.yaml
                  securityContext:
                    privileged: true
                  volumeMounts:
                  - name: pods-logs
                    mountPath: /var/log/pods
                    readOnly: true
                  - name: config
                    mountPath: /etc/promtail
                volumes:
                - name: pods-logs
                  hostPath:
                    path: /var/log/pods
                - name: config
                  configMap:
                    name: promtail-config
                    