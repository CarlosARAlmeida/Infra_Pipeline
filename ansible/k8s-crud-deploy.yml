---
- name: Deploy do Laboratório CRUD (Juice Shop + Postgres + Tracing)
  hosts: k8s_master
  become: true
  vars:
    # IMPORTANTE: Substitua pelo IP real do servidor onde o Docker/Jaeger está rodando
    jaeger_host: "172.22.0.87" 
  tasks:
    - name: Criar o Namespace isolado para o Lab
      kubernetes.core.k8s:
        kubeconfig: /etc/rancher/k3s/k3s.yaml
        name: crud-lab
        kind: Namespace
        state: present

    # --- INFRAESTRUTURA DE BANCO DE DADOS ---
    - name: Deploy do PostgreSQL
      kubernetes.core.k8s:
        kubeconfig: /etc/rancher/k3s/k3s.yaml
        state: present
        namespace: crud-lab
        definition:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: postgres-db
          spec:
            selector:
              matchLabels:
                app: postgres
            template:
              metadata:
                labels:
                  app: postgres
              spec:
                containers:
                - name: postgres
                  image: postgres:15-alpine
                  env:
                  - name: POSTGRES_PASSWORD
                    value: "senhadolab123"
                  - name: POSTGRES_DB
                    value: "juiceshop"
                  ports:
                  - containerPort: 5432

    - name: Criar Service para o PostgreSQL (DNS interno)
      kubernetes.core.k8s:
        kubeconfig: /etc/rancher/k3s/k3s.yaml
        state: present
        namespace: crud-lab
        definition:
          apiVersion: v1
          kind: Service
          metadata:
            name: postgres-svc
          spec:
            selector:
              app: postgres
            ports:
            - port: 5432
              targetPort: 5432

    # --- APLICAÇÃO COM INSTRUMENTAÇÃO OTEL ---
    - name: Deploy da Aplicação Juice Shop (CRUD & Tracing)
      kubernetes.core.k8s:
        kubeconfig: /etc/rancher/k3s/k3s.yaml
        state: present
        namespace: crud-lab
        definition:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: crud-app
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: crud-app
            template:
              metadata:
                labels:
                  app: crud-app
              spec:
                containers:
                - name: crud-app
                  image: bkimminich/juice-shop:latest
                  command: ["/bin/sh", "-c"]
                  args: 
                    - "node -r @opentelemetry/api -r @opentelemetry/sdk-node build/app.js"
                  env:
                  # Configuração do Banco de Dados
                  - name: NODE_ENV
                    value: "production"
                  # O Juice Shop usa esse formato para persistência externa
                  - name: DB_TYPE
                    value: "postgres"
                  - name: DB_HOST
                    value: "postgres-svc"
                  - name: DB_PORT
                    value: "5432"
                  - name: DB_NAME
                    value: "juiceshop"
                  - name: DB_USERNAME
                    value: "postgres"
                  - name: DB_PASSWORD
                    value: "senhadolab123"
                  
                  # --- CONFIGURAÇÃO DE OBSERVABILIDADE (O Pulo do Gato) ---
                  - name: OTEL_TRACES_EXPORTER
                    value: "otlp"
                  - name: OTEL_EXPORTER_OTLP_PROTOCOL
                    value: "http/protobuf"
                  - name: OTEL_EXPORTER_OTLP_ENDPOINT
                    value: "http://{{ jaeger_host }}:4318"
                  - name: OTEL_SERVICE_NAME
                    value: "app-crud-juice"
                  # -------------------------------------------------------
                  ports:
                  - containerPort: 3000

    - name: Expor a Aplicação via NodePort
      kubernetes.core.k8s:
        kubeconfig: /etc/rancher/k3s/k3s.yaml
        state: present
        namespace: crud-lab
        definition:
          apiVersion: v1
          kind: Service
          metadata:
            name: crud-app-svc
          spec:
            type: NodePort
            selector:
              app: crud-app
            ports:
            - port: 80
              targetPort: 3000
              nodePort: 30090