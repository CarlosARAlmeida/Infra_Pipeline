---
- name: Ajuste do Laboratório CRUD (Adicionando Redis para Cache)
  hosts: k8s_master
  become: true
  vars:
    jaeger_host: "172.22.0.87"
  tasks:
    - name: Garantir Namespace crud-lab
      kubernetes.core.k8s:
        kubeconfig: /etc/rancher/k3s/k3s.yaml
        name: crud-lab
        kind: Namespace
        state: present

    # --- BACKEND PARA CACHE (REDIS) ---
    - name: Deploy do Redis (Necessário para o /cache do Podinfo)
      kubernetes.core.k8s:
        kubeconfig: /etc/rancher/k3s/k3s.yaml
        state: present
        namespace: crud-lab
        definition:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: redis-db
          spec:
            selector:
              matchLabels:
                app: redis
            template:
              metadata:
                labels:
                  app: redis
              spec:
                containers:
                - name: redis
                  image: redis:alpine
                  ports:
                  - containerPort: 6379

    - name: Service do Redis
      kubernetes.core.k8s:
        kubeconfig: /etc/rancher/k3s/k3s.yaml
        state: present
        namespace: crud-lab
        definition:
          apiVersion: v1
          kind: Service
          metadata:
            name: redis-svc
          spec:
            selector:
              app: redis
            ports:
            - port: 6379

    # --- APLICAÇÃO PODINFO (CORRIGIDA) ---
    - name: Deploy da App CRUD (Conectada ao Redis)
      kubernetes.core.k8s:
        kubeconfig: /etc/rancher/k3s/k3s.yaml
        state: present
        namespace: crud-lab
        definition:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: crud-app
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: crud-app
            template:
              metadata:
                labels:
                  app: crud-app
              spec:
                containers:
                - name: crud-app
                  image: ghcr.io/stefanprodan/podinfo:6.3.5
                  env:
                  # 1. Ajuste do Redis: Apenas o endereço, sem o "tcp://"
                  - name: PODINFO_CACHE_SERVER
                    value: "redis-svc:6379"
                  
                  # 2. Ajuste do Tracing: Essencial para o Jaeger no .87
                  - name: OTEL_EXPORTER_OTLP_ENDPOINT
                    value: "http://172.22.0.87:4318"
                  - name: OTEL_EXPORTER_OTLP_PROTOCOL
                    value: "http/protobuf" # <--- Sem isso, o Jaeger ignora o tráfego na 4318
                  - name: OTEL_SERVICE_NAME
                    value: "crud-python-app"
                  ports:
                  - containerPort: 9898

    - name: Service da App (NodePort)
      kubernetes.core.k8s:
        kubeconfig: /etc/rancher/k3s/k3s.yaml
        state: present
        namespace: crud-lab
        definition:
          apiVersion: v1
          kind: Service
          metadata:
            name: crud-app-svc
          spec:
            type: NodePort
            selector:
              app: crud-app
            ports:
            - port: 80
              targetPort: 9898
              nodePort: 30090