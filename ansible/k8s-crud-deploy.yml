---
- name: Deploy do CRUD Real (Python FastAPI + Postgres)
  hosts: k8s_master
  become: true
  vars:
    # Substitua pelo IP onde o seu Jaeger (Docker) está a correr
    jaeger_host: "172.22.0.29" 
  tasks:
    - name: Garantir Namespace crud-lab
      kubernetes.core.k8s:
        kubeconfig: /etc/rancher/k3s/k3s.yaml
        name: crud-lab
        kind: Namespace
        state: present

    - name: Deploy do PostgreSQL
      kubernetes.core.k8s:
        kubeconfig: /etc/rancher/k3s/k3s.yaml
        state: present
        namespace: crud-lab
        definition:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: postgres-db
          spec:
            selector:
              matchLabels:
                app: postgres
            template:
              metadata:
                labels:
                  app: postgres
              spec:
                containers:
                - name: postgres
                  image: postgres:15-alpine
                  env:
                  - name: POSTGRES_PASSWORD
                    value: "senhadolab123"
                  - name: POSTGRES_DB
                    value: "lab_db"
                  ports:
                  - containerPort: 5432

    - name: Service do PostgreSQL
      kubernetes.core.k8s:
        kubeconfig: /etc/rancher/k3s/k3s.yaml
        state: present
        namespace: crud-lab
        definition:
          apiVersion: v1
          kind: Service
          metadata:
            name: postgres-svc
          spec:
            selector:
              app: postgres
            ports:
            - port: 5432

    - name: Deploy da App CRUD Python (SQLAlchemy + OTel)
      kubernetes.core.k8s:
        kubeconfig: /etc/rancher/k3s/k3s.yaml
        state: present
        namespace: crud-lab
        definition:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: crud-app
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: crud-app
            template:
              metadata:
                labels:
                  app: crud-app
              spec:
                containers:
                - name: crud-app
                  # Imagem pública de um CRUD FastAPI pronto para instrumentação
                  image: bkimminich/juice-shop:latest # Nota: Juice Shop é excelente para Tracing e Segurança
                  # OU podes usar esta abaixo que é mais focada em Python/SQL pura:
                  # image: nicolaslandriau/fastapi-postgresql-sample:latest
                  env:
                  - name: DATABASE_URL
                    value: "postgresql://postgres:senhadolab123@postgres-svc:5432/lab_db"
                  - name: OTEL_EXPORTER_OTLP_ENDPOINT
                    value: "http://{{ jaeger_host }}:4318"
                  - name: OTEL_SERVICE_NAME
                    value: "app-crud-contatos"
                  ports:
                  - containerPort: 3000 # Porta interna da Juice Shop

    - name: Service da App (NodePort)
      kubernetes.core.k8s:
        kubeconfig: /etc/rancher/k3s/k3s.yaml
        state: present
        namespace: crud-lab
        definition:
          apiVersion: v1
          kind: Service
          metadata:
            name: crud-app-svc
          spec:
            type: NodePort
            selector:
              app: crud-app
            ports:
            - port: 80
              targetPort: 3000
              nodePort: 30090