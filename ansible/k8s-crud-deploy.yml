---
- name: Ajuste do Laboratório CRUD (Adicionando Redis para Cache)
  hosts: k8s_master
  become: true
  vars:
    jaeger_host: "172.22.0.29"
  tasks:
    - name: Garantir Namespace crud-lab
      kubernetes.core.k8s:
        kubeconfig: /etc/rancher/k3s/k3s.yaml
        name: crud-lab
        kind: Namespace
        state: present

    # --- BACKEND PARA CACHE (REDIS) ---
    - name: Deploy do Redis (Necessário para o /cache do Podinfo)
      kubernetes.core.k8s:
        kubeconfig: /etc/rancher/k3s/k3s.yaml
        state: present
        namespace: crud-lab
        definition:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: redis-db
          spec:
            selector:
              matchLabels:
                app: redis
            template:
              metadata:
                labels:
                  app: redis
              spec:
                containers:
                - name: redis
                  image: redis:alpine
                  ports:
                  - containerPort: 6379

    - name: Service do Redis
      kubernetes.core.k8s:
        kubeconfig: /etc/rancher/k3s/k3s.yaml
        state: present
        namespace: crud-lab
        definition:
          apiVersion: v1
          kind: Service
          metadata:
            name: redis-svc
          spec:
            selector:
              app: redis
            ports:
            - port: 6379

    # --- APLICAÇÃO PODINFO (CORRIGIDA) ---
    - name: Deploy da App CRUD (Conectada ao Redis)
      kubernetes.core.k8s:
        kubeconfig: /etc/rancher/k3s/k3s.yaml
        state: present
        namespace: crud-lab
        definition:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: crud-app
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: crud-app
            template:
              metadata:
                labels:
                  app: crud-app
              spec:
                containers:
                - name: crud-app
                  image: ghcr.io/stefanprodan/podinfo:6.3.5
                  env:
                  - name: PODINFO_BACKEND_URL
                    value: "http://jaeger-svc:16686" # Apenas para simular uma chamada HTTP bem-sucedida
                  # 1. Ajuste do Redis: Apenas o endereço, sem o "tcp://"
                  - name: PODINFO_CACHE_SERVER
                    value: "redis-svc:6379" # Remova o prefixo para evitar que a biblioteca tente dar "parse" como URL de outro tipo
                  - name: OTEL_LOG_LEVEL
                    value: "debug" # Vai nos mostrar no log se ele falhar ao enviar para o .87
                  - name: OTEL_TRACES_SAMPLER
                    value: "always_on" # Garante que 100% das requisições gerem traces
                  # 2. Ajuste do Tracing: Essencial para o Jaeger no .87
                  - name: OTEL_EXPORTER_OTLP_ENDPOINT
                    value: "http://jaeger-svc.crud-lab:4317" # <--- Use HTTP, não HTTPS
                  - name: OTEL_EXPORTER_OTLP_INSECURE
                    value: "true" # <--- Força o modo sem TLS
                  - name: OTEL_EXPORTER_OTLP_PROTOCOL
                    value: "grpc" # <--- Garante que ele use gRPC para a porta 4317
                  ports:
                  - containerPort: 9898


    - name: Service da App (NodePort)
      kubernetes.core.k8s:
        kubeconfig: /etc/rancher/k3s/k3s.yaml
        state: present
        namespace: crud-lab
        definition:
          apiVersion: v1
          kind: Service
          metadata:
            name: crud-app-svc
          spec:
            type: NodePort
            selector:
              app: crud-app
            ports:
            - port: 80
              targetPort: 9898
              nodePort: 30090