- name: Deploy do Jaeger All-in-One no K3s
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    namespace: crud-lab
    definition:
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: jaeger
      spec:
        replicas: 1
        selector:
          matchLabels:
            app: jaeger
        template:
          metadata:
            labels:
              app: jaeger
          spec:
            containers:
            - name: jaeger
              image: jaegertracing/all-in-one:1.55
              env:
              - name: COLLECTOR_OTLP_ENABLED
                value: "true"
              - name: LOG_LEVEL
                value: "debug"
              ports:
              - containerPort: 16686 # UI
              - containerPort: 4317  # OTLP gRPC
              - containerPort: 4318  # OTLP HTTP

- name: Service do Jaeger (Expondo para o Mundo)
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    namespace: crud-lab
    definition:
      apiVersion: v1
      kind: Service
      metadata:
        name: jaeger-svc
      spec:
        type: NodePort
        selector:
          app: jaeger
        ports:
        - name: ui
          port: 16686
          nodePort: 31686 # Interface Web no IP:31686
        - name: otlp-grpc
          port: 4317
          nodePort: 31317
        - name: otlp-http
          port: 4318
          nodePort: 31318 # Ingestão no IP:31318