- name: Playbook para Deploy do Jaeger no K3s
  hosts: k8s_master  # <--- Verifique se este nome está igual ao seu inventory.ini
  become: true        # Garante privilégios de root para ler o k3s.yaml
  tasks:
    - name: Deploy do Jaeger All-in-One
      kubernetes.core.k8s:
        kubeconfig: /etc/rancher/k3s/k3s.yaml
        state: present
        namespace: crud-lab
        definition:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: jaeger
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: jaeger
            template:
              metadata:
                labels:
                  app: jaeger
              spec:
                containers:
                - name: jaeger
                  image: jaegertracing/all-in-one:1.55
                  env:
                  - name: COLLECTOR_OTLP_ENABLED
                    value: "true"
                  - name: LOG_LEVEL
                    value: "debug"
                  ports:
                  - containerPort: 16686 # UI
                  - containerPort: 4317  # OTLP gRPC
                  - containerPort: 4318  # OTLP HTTP

    - name: Service do Jaeger (Expondo via NodePort)
      kubernetes.core.k8s:
        kubeconfig: /etc/rancher/k3s/k3s.yaml
        state: present
        namespace: crud-lab
        definition:
          apiVersion: v1
          kind: Service
          metadata:
            name: jaeger-svc
          spec:
            type: NodePort
            selector:
              app: jaeger
            ports:
            - name: ui
              port: 16686
              nodePort: 31686
            - name: otlp-grpc
              port: 4317
              nodePort: 31317
            - name: otlp-http
              port: 4318
              nodePort: 31318