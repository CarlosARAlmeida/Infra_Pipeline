- name: Setup Observability Stack (Helm + Prometheus + Grafana)
  hosts: k8s_master
  become: true
  tasks:
    - name: Baixar script de instalação do Helm
      shell: |
        curl -fsSL -o /tmp/get_helm.sh https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3
        chmod 700 /tmp/get_helm.sh
      args:
        creates: /tmp/get_helm.sh

    - name: Executar instalação do Helm
      shell: /tmp/get_helm.sh
      args:
        creates: /usr/local/bin/helm

    - name: Adicionar repositórios Helm
      kubernetes.core.helm_repository:
        name: "{{ item.name }}"
        repo_url: "{{ item.url }}"
      loop:
        - { name: 'prometheus-community', url: 'https://prometheus-community.github.io/helm-charts' }
        - { name: 'grafana', url: 'https://grafana.github.io/helm-charts' }
      
    - name: Atualizar repositórios Helm
      shell: helm repo update

    - name: Criar Novo PVC Manual para o Grafana (V4)
      kubernetes.core.k8s:
        kubeconfig: /etc/rancher/k3s/k3s.yaml
        state: present
        definition:
          apiVersion: v1
          kind: PersistentVolumeClaim
          metadata:
            name: grafana-pvc-v4
            namespace: observability
          spec:
            accessModes:
              - ReadWriteOnce
            storageClassName: local-path
            resources:
              requests:
                storage: 5Gi

    - name: Deploy kube-prometheus-stack (Namespace observability)
      kubernetes.core.helm:
        kubeconfig: /etc/rancher/k3s/k3s.yaml
        name: prometheus-stack
        chart_ref: prometheus-community/kube-prometheus-stack
        release_namespace: observability
        create_namespace: true
        values:
          grafana:
            # Força a senha admin para evitar erro de CreateContainerConfig (Secret missing)
            adminPassword: "admin"
            
            # Estratégia de Deploy (Recreate é vital para soltar o volume no Proxmox)
            deploymentStrategy:
              type: Recreate
            
            # Permissões de Root para o Init Container do Grafana
            securityContext:
              runAsUser: 0
              runAsGroup: 0
              fsGroup: 0
            
            persistence:
              enabled: true
              existingClaim: grafana-pvc-v4

            podSecurityContext:
              fsGroup: 472

            securityContext:
              runAsUser: 472  # Usuário padrão do Grafana (Não é root!)
              runAsGroup: 472
              runAsNonRoot: true

            service:
              type: NodePort
              nodePort: 32000
            
            # --- CORRELAÇÃO DE LOGS E TRACES ---
            additionalDataSources:
              - name: Loki
                type: loki
                uid: loki-datasource-id
                url: http://172.22.0.29:32219 
                jsonData:
                  derivedFields:
                    - datasourceUid: jaeger-datasource-id
                      name: TraceID
                      matcherRegex: '(?i)traceid[=:]\s*["'']?(\w+)["'']?'
                      url: "$${__value.raw}"
              
              - name: Jaeger
                type: jaeger
                uid: jaeger-datasource-id
                url: http://jaeger-svc.observability:16686
                jsonData:
                  nodeGraph:
                    enabled: true