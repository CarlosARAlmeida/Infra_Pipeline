---
- name: Setup Observability Stack (Helm + Prometheus + Grafana)
  hosts: k8s_master
  become: true
  tasks:
    - name: Baixar script de instalação do Helm (via curl para evitar bug de SSL do Python)
      shell: |
        curl -fsSL -o /tmp/get_helm.sh https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3
        chmod 700 /tmp/get_helm.sh
      args:
        creates: /tmp/get_helm.sh

    - name: Executar instalação do Helm
      shell: /tmp/get_helm.sh
      args:
        creates: /usr/local/bin/helm

    - name: Adicionar repositórios Helm (Prometheus e Grafana)
      kubernetes.core.helm_repository:
        name: "{{ item.name }}"
        repo_url: "{{ item.url }}"
      loop:
        - { name: 'prometheus-community', url: 'https://prometheus-community.github.io/helm-charts' }
        - { name: 'grafana', url: 'https://grafana.github.io/helm-charts' }
      
    - name: Atualizar repositórios Helm
      shell: helm repo update

    - name: Deploy kube-prometheus-stack (Namespace observability)
      kubernetes.core.helm:
        kubeconfig: /etc/rancher/k3s/k3s.yaml
        name: prometheus-stack
        chart_ref: prometheus-community/kube-prometheus-stack
        release_namespace: observability
        create_namespace: true
        values:
          grafana:
            securityContext:
              runAsUser: 0
              runAsGroup: 0
              fsGroup: 0
            
            # CORREÇÃO: O lugar correto da estratégia no chart do Grafana
            deploymentStrategy:
              type: Recreate
            
            service:
              type: NodePort
              nodePort: 32000
            
            persistence:
              enabled: true
              type: pvc
              storageClassName: local-path
              accessModes:
                - ReadWriteOnce
              size: 5Gi  

            # --- CONFIGURAÇÃO AUTOMÁTICA DE DATA SOURCES COM CORRELAÇÃO ---
            additionalDataSources:
              - name: Loki
                type: loki
                uid: loki-datasource-id
                url: http://loki.observability:3100
                jsonData:
                  derivedFields:
                    - datasourceUid: jaeger-datasource-id
                      name: TraceID
                      # Regex melhorado para capturar traceid=, traceId:, etc.
                      matcherRegex: "(?:traceid|traceID|trace_id)[=:]\\s*\"?(\\w+)\"?"
                      url: "$${__value.raw}" # O link interno que abre o Jaeger
              
              - name: Jaeger
                type: jaeger
                uid: jaeger-datasource-id
                url: http://jaeger-svc.observability:16686
                jsonData:
                  nodeGraph:
                    enabled: true