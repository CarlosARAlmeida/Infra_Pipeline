- name: Injetar Promtail Nativo nos Nodes (Master e Workers)
  hosts: all
  become: true
  tasks:
    - name: Baixar binário do Promtail via Curl
      command: "curl -L https://github.com/grafana/loki/releases/download/v2.9.4/promtail-linux-amd64.zip -o /tmp/promtail.zip"
      args:
        creates: /tmp/promtail.zip

    - name: Instalar unzip se necessário
      apt:
        name: unzip
        state: present
        update_cache: yes

    - name: Extrair binário para /usr/local/bin
      unarchive:
        src: /tmp/promtail.zip
        dest: /usr/local/bin/
        remote_src: yes
        mode: '0755'

    - name: Criar diretório de configuração
      file:
        path: /etc/promtail
        state: directory

    # ... (Partes iniciais de download e extração iguais) ...

    - name: Injetar Configuração Simplificada (Logs via Path)
      copy:
        dest: /etc/promtail/config.yml
        content: |
          server:
            http_listen_port: 9080

          clients:
            - url: http://172.22.0.29:31100/loki/api/v1/push

          scrape_configs:
            - job_name: kubernetes-logs
              static_configs:
                - targets: [localhost]
                  labels:
                    node: "{{ inventory_hostname }}"
                    __path__: /var/log/pods/*/*/*.log
              
              pipeline_stages:
                - regex:
                    source: filename
                    expression: "/var/log/pods/(?P<namespace>[^_]+)_(?P<pod_name>[^_]+)_(?P<uid>[a-z0-9-]+)/(?P<container_name>[^/]+)/"
                - labels:
                    namespace:
                    pod_name:
                    container_name:

# ... (Partes de Systemd e restart iguais) ...

    - name: Criar Unidade de Serviço Systemd
      copy:
        dest: /etc/systemd/system/promtail.service
        content: |
          [Unit]
          Description=Promtail Service (Native)
          After=network.target

          [Service]
          Type=simple
          User=root
          ExecStart=/usr/local/bin/promtail-linux-amd64 -config.file=/etc/promtail/config.yml
          Restart=always

          [Install]
          WantedBy=multi-user.target

    - name: Ativar e Iniciar o Promtail
      systemd:
        name: promtail
        state: restarted
        enabled: yes
        daemon_reload: yes