---
- name: Deploy do Loki
  hosts: k8s_master
  become: true
  tasks:
    - name: Deploy Loki (Apenas o Servidor)
      kubernetes.core.helm:
        kubeconfig: /etc/rancher/k3s/k3s.yaml
        name: loki
        chart_ref: grafana/loki
        release_namespace: observability
        values:
          # 1. Define o modo simples (um único pod)
          deploymentMode: SingleBinary

          loki:
            auth_enabled: false
            commonConfig:
              replication_factor: 1
            
            # 2. Resolve o erro do 'bucketNames' e define armazenamento local
            storage:
              type: filesystem
              bucketNames:
                chunks: chunks
                tags: tags
                admin: admin

            schemaConfig:
              configs:
                - from: "2024-01-01"
                  store: tsdb
                  object_store: filesystem
                  schema: v13
                  index:
                    prefix: index_
                    period: 24h

          # 3. Configuração do Pod Único e Persistência
          singleBinary:
            replicas: 1
            persistence:
              enabled: true
              size: 5Gi
              storageClass: local-path

          # 4. Expõe a porta 3100 para o seu Promtail Nativo
          lokiCanary:
            enabled: false
          test:
            enabled: false
          gateway:
            enabled: true
            service:
              type: NodePort
              nodePort: 3100