- name: Deploy do Loki
  hosts: k8s_master
  become: true
  tasks:
    - name: Deploy Loki (Apenas o Servidor)
      kubernetes.core.helm:
        kubeconfig: /etc/rancher/k3s/k3s.yaml
        name: loki
        chart_ref: grafana/loki
        release_namespace: observability
        values:
          # 1. Modo Único e Desativação de Caches
          deploymentMode: SingleBinary
          chunksCache: { enabled: false }
          resultsCache: { enabled: false }
          memcached: { enabled: false }
          lokiCanary: { enabled: false }
          test: { enabled: false }

          loki:
            auth_enabled: false
            commonConfig:
              replication_factor: 1
            storage:
              type: filesystem
              bucketNames:
                chunks: chunks
                tags: tags
                admin: admin
            schemaConfig:
              configs:
                - from: "2024-01-01"
                  store: tsdb
                  object_store: filesystem
                  schema: v13
                  index:
                    prefix: index_
                    period: 24h

            # --- CORREÇÃO: O serviço agora é o 'Portão de Entrada' ---
            service:
              type: NodePort
              nodePort: 31100
              port: 3100 # Porta interna do binário

          # 2. Configura a instância única
          singleBinary:
            replicas: 1
            persistence:
              enabled: true
              size: 5Gi
              storageClass: local-path

          # 3. Zera os componentes escaláveis para não dar conflito
          read: { replicas: 0 }
          write: { replicas: 0 }
          backend: { replicas: 0 }

          # 4. Desativa o Gateway (Nginx) - Tráfego vai direto pro loki-0
          gateway:
            enabled: false