---
- name: Deploy do Loki
  hosts: k8s_master
  become: true
  tasks:
    - name: Deploy Loki (Apenas o Servidor)
      kubernetes.core.helm:
        kubeconfig: /etc/rancher/k3s/k3s.yaml
        name: loki
        chart_ref: grafana/loki
        release_namespace: observability
        values:
          # 1. Define o modo único
          deploymentMode: SingleBinary

          loki:
            auth_enabled: false
            commonConfig:
              replication_factor: 1
            storage:
              type: filesystem
              bucketNames:
                chunks: chunks
                tags: tags
                admin: admin
            schemaConfig:
              configs:
                - from: "2024-01-01"
                  store: tsdb
                  object_store: filesystem
                  schema: v13
                  index:
                    prefix: index_
                    period: 24h

          # 2. Configura o binário único
          singleBinary:
            replicas: 1
            persistence:
              enabled: true
              size: 5Gi
              storageClass: local-path

          # 3. O FIX: Zerar explicitamente os componentes do modo Scalable
          read:
            replicas: 0
          write:
            replicas: 0
          backend:
            replicas: 0

          # 4. Gateway para acesso via NodePort (Promtail Nativo)
          gateway:
            enabled: true
            service:
              type: NodePort
              nodePort: 3100
          
          lokiCanary:
            enabled: false
          test:
            enabled: false