---
- name: Preparar nodes para o Cluster K3s
  hosts: all
  become: true
  tasks:
    # --- ESSA É A PARTE QUE CORRIGE O ERRO ---
    - name: Aguardar o término de outros processos APT (Lock)
      shell: |
        while fuser /var/lib/dpkg/lock-frontend >/dev/null 2>&1; do
          echo "Aguardando trava do APT..."
          sleep 5
        done
      register: apt_lock_wait
      changed_when: false

    # --- RESTANTE DO PLAYBOOK (INDENTADO CORRETAMENTE) ---
    - name: Desativar SWAP imediatamente
      command: swapoff -a
      when: ansible_swaptotal_mb > 0

    - name: Remover SWAP do /etc/fstab para persistência
      replace:
        path: /etc/fstab
        regexp: '^([^#].*?\sswap\s+.*)$'
        replace: '# \1'

    - name: Carregar módulos do Kernel necessários (overlay e br_netfilter)
      copy:
        dest: /etc/modules-load.d/k8s.conf
        content: |
          overlay
          br_netfilter

    - name: Aplicar módulos agora
      modprobe:
        name: "{{ item }}"
      loop: [ 'overlay', 'br_netfilter' ]

    - name: Configurar parâmetros de rede no Sysctl
      sysctl:
        name: "{{ item.key }}"
        value: "{{ item.value }}"
        state: present
        reload: yes
      loop:
        - { key: 'net.bridge.bridge-nf-call-iptables', value: '1' }
        - { key: 'net.bridge.bridge-nf-call-ip6tables', value: '1' }
        - { key: 'net.ipv4.ip_forward', value: '1' }

    - name: Instalar pacotes de suporte (NFS, Curl, etc)
      apt:
        name: [ 'curl', 'nfs-common', 'open-iscsi' ]
        state: present
        update_cache: yes

    - name: Garantir sincronização de tempo (NTP) em todos os nós
      hosts: k8s_master, k8s_workers
      become: true
      tasks:
        - name: Instalar systemd-timesyncd
          apt:
            name: systemd-timesyncd
            state: present

    - name: Configurar NTP brasileiro
      copy:
        content: |
          [Time]
          NTP=a.st1.ntp.br b.st1.ntp.br
          FallbackNTP=pool.ntp.org
        dest: /etc/systemd/timesyncd.conf
      notify: restart_timesyncd

      handlers:
        - name: restart_timesyncd
          systemd:
            name: systemd-timesyncd
            state: restarted
            enabled: true

            