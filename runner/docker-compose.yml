version: '3.8'

services:
  proxmox-runner:
    build: .
    container_name: github-runner-proxmox
    restart: always
    environment:
      # URL do seu repositório ou organização
      - REPO_URL=https://github.com/seu-usuario/seu-projeto-devops
      # Token gerado no GitHub (Settings > Actions > Runners)
      - RUNNER_TOKEN=COLE_AQUI_SEU_TOKEN
      - RUNNER_NAME=runner-container-proxmox
      - RUNNER_LABELS=proxmox,terraform,ansible
    volumes:
      # Essencial para que o runner possa criar containers se necessário
      - /var/run/docker.sock:/var/run/docker.sock